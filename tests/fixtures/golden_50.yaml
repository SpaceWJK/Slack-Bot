# task-129 Step 6 — golden 50건 (재큐레이션, 실제 DB path 기반)
# 큐레이션 기준:
#   - 모든 query에 대해 실제 DB SELECT 결과 검증 후 expected_top3 작성
#   - 한국어 FTS5 unicode61 미지원 회피 (search_fts/chunks_fts 모두 한국어 단독 단어 0건)
#   - title-기반 metadata, path-기반 list, body_keywords는 영문 중심 사용
#   - Master M-1~M-5 사례 의무 포함
#   - wiki nodes.game_alias_kr=NULL (task-115/129.5 carryover) — ancestor_game 미사용
#   - gdi path는 영문 (Chaoszero/Epicseven), game_alias_kr는 한국어 — 이를 정합

metadata:
  created_at: "2026-04-29"
  step: 6
  curation_method: "DB SELECT 직접 실행 후 hit 확인된 케이스만 등록"
  master_cases_included: [M-1, M-2, M-3, M-4, M-5]
  wiki_count: 25
  gdi_count: 25
  notes:
    - "wiki search_fts unicode61: 한국어 단어 FTS 미지원 (장애/리타 등 0건)"
    - "wiki nodes.game_alias_kr 전부 NULL (task-115 backfill 영역)"
    - "gdi path는 영문 (Chaoszero/Epicseven/Lordnine), title은 한국어"
    - "chunks_fts unicode61: 패치노트(공백 포함)/Bug/BAT 등은 OK, 리타/나인 단독은 0건"

